<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Master v18 - by Mohammad Aienor R.</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Konfigurasi Tailwind untuk mengaktifkan Dark Mode via Class -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { transition: all 0.3s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        .gradient-primary { background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); }
        
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #4f46e5; border-radius: 20px; }

        @media (max-width: 768px) {
            .q-type { min-width: 160px; }
            .q-level { min-width: 140px; }
            .q-stimulus { min-width: 150px; }
            .q-topic { min-width: 220px; }
        }

        .custom-cb { width: 18px; height: 18px; cursor: pointer; accent-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen py-6 px-4 md:px-8 transition-colors duration-300">
    
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="gradient-primary p-3 rounded-2xl shadow-lg shadow-indigo-500/30 text-white">
                    <i data-lucide="book-open-check" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-800 dark:text-white">Prompt Master <span class="text-indigo-500">v18</span></h1>
                    <p class="text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">Mohammad Aienor Rakhman, S.Pd</p>
                </div>
            </div>
            <button onclick="toggleTheme()" id="themeBtn" class="p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:scale-110 transition-all">
                <!-- Icon will be injected by JS -->
            </button>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            
            <!-- Left Side: Control Panel -->
            <div class="xl:col-span-8 space-y-6">
                <div class="card bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm space-y-5 transition-colors">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 tracking-widest">Penyusun</label>
                            <input type="text" id="author" placeholder="Mohammad Aienor Rakhman, S.Pd" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-colors" oninput="generatePrompt()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 tracking-widest">Mata Pelajaran</label>
                            <input type="text" id="subject" placeholder="Fisika" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-colors" oninput="generatePrompt()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 tracking-widest">Kelas/Fase</label>
                            <select id="grade" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white text-sm outline-none transition-colors" onchange="generatePrompt()">
                                <option value="X (Fase E)">Kelas 10 (Fase E)</option>
                                <option value="XI (Fase F)">Kelas 11 (Fase F)</option>
                                <option value="XII (Fase F)">Kelas 12 (Fase F)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 tracking-widest">Materi Utama</label>
                            <input type="text" id="mainTopic" placeholder="Contoh: Arus Bolak Balik" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-colors" oninput="updateAllTopics()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 tracking-widest">Metode Asesmen</label>
                            <div class="flex gap-2">
                                <select id="assessmentType" class="flex-1 p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white text-sm outline-none transition-colors" onchange="generatePrompt()">
                                    <option value="Soal Reguler">Reguler</option>
                                    <option value="AKM (Numerasi)">AKM Numerasi</option>
                                    <option value="AKM (Literasi)">AKM Literasi</option>
                                    <option value="AKM (Campuran: Literasi & Numerasi)">AKM Campuran</option>
                                </select>
                                <input type="number" id="totalQuestions" value="5" min="1" max="50" class="w-20 p-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 dark:text-white text-sm text-center font-black transition-colors" oninput="renderTable()">
                            </div>
                        </div>
                    </div>

                    <!-- Bulk Settings -->
                    <div class="p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 flex flex-wrap gap-4 items-center transition-colors">
                        <div class="flex items-center gap-2">
                            <i data-lucide="check-square" class="w-4 h-4 text-indigo-500 dark:text-indigo-400"></i>
                            <span class="text-[10px] font-black uppercase text-indigo-600 dark:text-indigo-400 tracking-wider">Set Seragam:</span>
                        </div>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" id="syncType" class="custom-cb" onchange="syncAllSettings()">
                            <span class="text-xs font-bold text-slate-600 dark:text-slate-300 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors">Jenis Soal</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" id="syncLevel" class="custom-cb" onchange="syncAllSettings()">
                            <span class="text-xs font-bold text-slate-600 dark:text-slate-300 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors">Level</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" id="syncStimulus" class="custom-cb" onchange="syncAllSettings()">
                            <span class="text-xs font-bold text-slate-600 dark:text-slate-300 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors">Stimulus</span>
                        </label>
                        
                        <!-- Menu Acak -->
                        <div class="w-full sm:w-px h-px sm:h-6 bg-indigo-200 dark:bg-indigo-800 sm:mx-2 block"></div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="shuffle" class="w-4 h-4 text-indigo-500 dark:text-indigo-400"></i>
                            <span class="text-[10px] font-black uppercase text-indigo-600 dark:text-indigo-400 tracking-wider">Menu Acak:</span>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="randomizeType()" class="px-3 py-1.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm hover:border-indigo-300 dark:hover:border-indigo-500 transition-all">
                                Jenis Soal
                            </button>
                            <button onclick="randomizeLevel()" class="px-3 py-1.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm hover:border-indigo-300 dark:hover:border-indigo-500 transition-all">
                                Level
                            </button>
                            <button onclick="randomizeStimulus()" class="px-3 py-1.5 text-xs font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm hover:border-indigo-300 dark:hover:border-indigo-500 transition-all">
                                Stimulus
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Input Matrix Table -->
                <div class="card bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-xl overflow-hidden flex flex-col h-[550px] transition-colors">
                    <div class="overflow-auto table-container flex-1">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-slate-50 dark:bg-slate-800/80 backdrop-blur-sm z-20 border-b border-slate-200 dark:border-slate-700">
                                <tr>
                                    <th class="p-4 text-[10px] font-black uppercase text-slate-400 dark:text-slate-400 w-10 text-center">No</th>
                                    <th class="p-4 text-[10px] font-black uppercase text-slate-400 dark:text-slate-400">Jenis Soal</th>
                                    <th class="p-4 text-[10px] font-black uppercase text-slate-400 dark:text-slate-400 w-24">Level</th>
                                    <th class="p-4 text-[10px] font-black uppercase text-slate-400 dark:text-slate-400">Jenis Stimulus</th>
                                    <th class="p-4 text-[10px] font-black uppercase text-slate-400 dark:text-slate-400 w-1/3">Materi Spesifik</th>
                                </tr>
                            </thead>
                            <tbody id="questionTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Side: Result -->
            <div class="xl:col-span-4 space-y-4">
                <div class="sticky top-6">
                    <button onclick="copyToClipboard()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl shadow-lg shadow-indigo-600/20 transition-all mb-4 flex items-center justify-center gap-2 font-bold text-sm">
                        <i data-lucide="copy" class="w-4 h-4"></i> Salin Prompt
                    </button>
                    <textarea id="finalPrompt" readonly class="w-full h-[650px] p-6 text-[10px] font-mono leading-relaxed bg-slate-900 dark:bg-slate-950 text-indigo-100 rounded-[2rem] border-4 border-slate-800 dark:border-slate-800 focus:outline-none resize-none shadow-xl transition-colors" placeholder="Prompt akan digenerate otomatis..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Init Themes
        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeIcon(isDark);
        }

        function updateThemeIcon(isDark) {
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = isDark 
                ? `<i data-lucide="sun" class="w-5 h-5 text-yellow-400"></i>` 
                : `<i data-lucide="moon" class="w-5 h-5 text-slate-600"></i>`;
            lucide.createIcons();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        const tableBody = document.getElementById('questionTableBody');
        const totalInput = document.getElementById('totalQuestions');
        const mainTopicInput = document.getElementById('mainTopic');
        const syncTypeCb = document.getElementById('syncType');
        const syncLevelCb = document.getElementById('syncLevel');
        const syncStimulusCb = document.getElementById('syncStimulus');

        function renderTable() {
            const count = Math.min(parseInt(totalInput.value) || 0, 50);
            const currentRows = tableBody.children.length;
            const defTopic = mainTopicInput.value || "";

            if (count > currentRows) {
                for (let i = currentRows + 1; i <= count; i++) {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-4 text-center font-bold text-slate-400 dark:text-slate-500">${i}</td>
                        <td class="p-2">
                            <select class="q-type w-full p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white text-xs outline-none transition-colors" onchange="syncAllSettings()">
                                <option>Pilihan Ganda (PG)</option>
                                <option>PG Kompleks</option>
                                <option>Menjodohkan</option>
                                <option>Isian Singkat</option>
                                <option>Uraian</option>
                                <option>Benar Salah</option>
                            </select>
                        </td>
                        <td class="p-2">
                            <select class="q-level w-full p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white text-xs outline-none transition-colors" onchange="syncAllSettings()">
                                <option value="L1">L1</option>
                                <option value="L2">L2</option>
                                <option value="L3" selected>L3</option>
                            </select>
                        </td>
                        <td class="p-2">
                            <select class="q-stimulus w-full p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white text-xs outline-none transition-colors" onchange="syncAllSettings()">
                                <option value="Teks Kontekstual">Teks Kontekstual</option>
                                <option value="Grafik">Grafik</option>
                                <option value="Tabel Data">Tabel Data</option>
                                <option value="Ilustrasi">Ilustrasi</option>
                                <option value="Infografis">Infografis</option>
                            </select>
                        </td>
                        <td class="p-2">
                            <textarea class="q-topic w-full p-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white text-xs outline-none resize-y transition-colors" rows="2" placeholder="${defTopic}" oninput="generatePrompt()"></textarea>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                }
            } else {
                while (tableBody.children.length > count) tableBody.removeChild(tableBody.lastChild);
            }
            syncAllSettings();
        }

        function syncAllSettings() {
            const rows = tableBody.querySelectorAll('tr');
            if (rows.length === 0) return;

            const firstType = rows[0].querySelector('.q-type').value;
            const firstLevel = rows[0].querySelector('.q-level').value;
            const firstStimulus = rows[0].querySelector('.q-stimulus').value;

            rows.forEach((row, idx) => {
                const typeEl = row.querySelector('.q-type');
                const levelEl = row.querySelector('.q-level');
                const stimulusEl = row.querySelector('.q-stimulus');

                // Sync Type
                if (syncTypeCb.checked) {
                    if (idx > 0) typeEl.value = firstType;
                    typeEl.disabled = (idx > 0);
                    typeEl.classList.toggle('opacity-50', idx > 0);
                } else {
                    typeEl.disabled = false;
                    typeEl.classList.remove('opacity-50');
                }

                // Sync Level
                if (syncLevelCb.checked) {
                    if (idx > 0) levelEl.value = firstLevel;
                    levelEl.disabled = (idx > 0);
                    levelEl.classList.toggle('opacity-50', idx > 0);
                } else {
                    levelEl.disabled = false;
                    levelEl.classList.remove('opacity-50');
                }

                // Sync Stimulus
                if (syncStimulusCb.checked) {
                    if (idx > 0) stimulusEl.value = firstStimulus;
                    stimulusEl.disabled = (idx > 0);
                    stimulusEl.classList.toggle('opacity-50', idx > 0);
                } else {
                    stimulusEl.disabled = false;
                    stimulusEl.classList.remove('opacity-50');
                }
            });
            generatePrompt();
        }

        function randomizeType() {
            if (syncTypeCb.checked) {
                syncTypeCb.checked = false;
                syncAllSettings();
            }
            const types = ["Pilihan Ganda (PG)", "PG Kompleks", "Menjodohkan", "Isian Singkat", "Uraian", "Benar Salah"];
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const typeEl = row.querySelector('.q-type');
                const randomType = types[Math.floor(Math.random() * types.length)];
                typeEl.value = randomType;
            });
            generatePrompt();
        }

        function randomizeLevel() {
            if (syncLevelCb.checked) {
                syncLevelCb.checked = false;
                syncAllSettings();
            }
            const levels = ["L1", "L2", "L3"];
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const levelEl = row.querySelector('.q-level');
                const randomLevel = levels[Math.floor(Math.random() * levels.length)];
                levelEl.value = randomLevel;
            });
            generatePrompt();
        }

        function randomizeStimulus() {
            if (syncStimulusCb.checked) {
                syncStimulusCb.checked = false;
                syncAllSettings();
            }
            const stimuli = ["Grafik", "Tabel Data", "Ilustrasi", "Teks Kontekstual", "Infografis"];
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const stimulusEl = row.querySelector('.q-stimulus');
                const randomStimulus = stimuli[Math.floor(Math.random() * stimuli.length)];
                stimulusEl.value = randomStimulus;
            });
            generatePrompt();
        }

        function updateAllTopics() {
            const inputs = document.querySelectorAll('.q-topic');
            inputs.forEach(input => input.placeholder = mainTopicInput.value || "Materi...");
            generatePrompt();
        }

        function generatePrompt() {
            const author = document.getElementById('author').value || "Mohammad Aienor Rakhman, S.Pd";
            const subject = document.getElementById('subject').value || "Fisika";
            const grade = document.getElementById('grade').value;
            const assess = document.getElementById('assessmentType').value;

            const rows = tableBody.querySelectorAll('tr');
            let qList = "";
            rows.forEach((row, i) => {
                const type = row.querySelector('.q-type').value;
                const level = row.querySelector('.q-level').value;
                const stimulus = row.querySelector('.q-stimulus').value;
                const topic = row.querySelector('.q-topic').value || mainTopicInput.value || "Materi Relevan";
                qList += `${i+1}. Jenis: ${type} | Level: ${level} | Stimulus: ${stimulus} | Materi: ${topic}\n`;
            });

            const prompt = `Bertindaklah sebagai Ahli Kurikulum dan Guru Fisika Senior.

DATA ADMINISTRASI:
- Nama Penyusun: ${author}
- Mata Pelajaran: ${subject}
- Tingkat/Fase: ${grade}
- Mode Asesmen: ${assess}

TUGAS UTAMA:

1. KISI-KISI SOAL (FORMAT TABEL):
Buat tabel kisi-kisi untuk ${rows.length} butir soal dengan kolom sebagai berikut:
| No | CP (Capaian Pembelajaran) | Materi | Indikator Soal | Level | Taksonomi Bloom (C1-C6) | Jenis Soal |

2. NASKAH SOAL:
Buatlah naskah soal lengkap (No 1 s.d ${rows.length}) sesuai rincian berikut:
${qList}
   *Ketentuan: 
   - WAJIB gunakan jenis stimulus yang telah ditetapkan pada rincian di atas untuk masing-masing soal.
   - Jika L3, soal harus bersifat analitis/kontekstual/HOTS.
   - Jika soal menggunakan stimulus GRAFIK, WAJIB sertakan tabel data angkanya yang bisa disalin ke Excel untuk digambar ulang, selain mendeskripsikan visual grafiknya dengan teks.*

3. KARTU SOAL (FORMAT LANDSCAPE/HORIZONTAL):
Sajikan data kartu soal untuk SELURUH nomor (1 s.d ${rows.length}). DILARANG KERAS melakukan sampling (menampilkan sebagian saja).
Setiap nomor wajib dituliskan secara mandiri dalam baris tabel dengan kolom:
| No | CP | ATP | Indikator Soal | Elemen | Level | Taksonomi Bloom | No Soal | Naskah Soal (Tulis Ulang) | Kunci (Hasil Akhir Saja) |

4. PEMBAHASAN:
Berikan langkah-langkah penyelesaian singkat untuk setiap nomor (1 s.d ${rows.length}) di bagian akhir naskah.

Pastikan akurasi konsep fisika, penggunaan satuan internasional, dan kualitas bahasa Indonesia yang baku.`;

            document.getElementById('finalPrompt').value = prompt;
        }

        function copyToClipboard() {
            const el = document.getElementById('finalPrompt');
            el.select();
            document.execCommand('copy');
            const btn = document.querySelector('button[onclick="copyToClipboard()"]');
            btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Tersalin!`;
            setTimeout(() => { 
                btn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> Salin Prompt`;
                lucide.createIcons();
            }, 2000);
        }

        // Initialize App
        initTheme();
        renderTable();
    </script>
</body>
</html>
