<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Master v20 - by Mohammad Aienor R.</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for Custom Themes -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: {
                            surface: 'var(--bg-surface)',
                            surfaceEl: 'var(--bg-surface-el)',
                            border: 'var(--border-color)',
                            text: 'var(--text-main)',
                            muted: 'var(--text-muted)',
                            primary: 'var(--color-primary)',
                            primaryHover: 'var(--color-primary-hover)',
                            ring: 'var(--color-ring)',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 var(--shadow-color)',
                        'glass-sm': '0 4px 16px 0 var(--shadow-color)',
                    }
                }
            }
        }
    </script>

    <style>
        /* ================= THEME VARIABLES (GRADIENTS & GLASS) ================= */
        :root {
            /* 1. Light Theme (Nuansa Pagi/Terang - Fokus & Jernih) */
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f1f5f9 100%);
            --bg-surface: rgba(255, 255, 255, 0.7);
            --bg-surface-el: rgba(255, 255, 255, 0.9);
            --border-color: rgba(148, 163, 184, 0.3);
            --text-main: #0f172a;
            --text-muted: #475569;
            --color-primary: #0284c7;
            --color-primary-hover: #0369a1;
            --color-ring: rgba(2, 132, 199, 0.4);
            --shadow-color: rgba(15, 23, 42, 0.05);
        }

        [data-theme="dark"] {
            /* 2. Dark Theme (Default - Nuansa Malam/Bintang - Elegan) */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --bg-surface: rgba(30, 41, 59, 0.65);
            --bg-surface-el: rgba(51, 65, 85, 0.75);
            --border-color: rgba(148, 163, 184, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --color-primary: #6366f1;
            --color-primary-hover: #818cf8;
            --color-ring: rgba(99, 102, 241, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.25);
        }

        [data-theme="purple"] {
            /* 3. Purple Theme (Nuansa Kreativitas & Kebijaksanaan) */
            --bg-gradient: linear-gradient(135deg, #2e1065 0%, #4c1d95 100%);
            --bg-surface: rgba(46, 16, 101, 0.65);
            --bg-surface-el: rgba(76, 29, 149, 0.75);
            --border-color: rgba(167, 139, 250, 0.25);
            --text-main: #f5f3ff;
            --text-muted: #c4b5fd;
            --color-primary: #a855f7;
            --color-primary-hover: #c084fc;
            --color-ring: rgba(168, 85, 247, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        [data-theme="orange"] {
            /* 4. Orange Theme (Nuansa Senja/Semangat Belajar) */
            --bg-gradient: linear-gradient(135deg, #7c2d12 0%, #9a3412 100%);
            --bg-surface: rgba(67, 20, 7, 0.65);
            --bg-surface-el: rgba(124, 45, 18, 0.75);
            --border-color: rgba(253, 186, 116, 0.2);
            --text-main: #fff7ed;
            --text-muted: #fdba74;
            --color-primary: #f97316;
            --color-primary-hover: #fb923c;
            --color-ring: rgba(249, 115, 22, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.25);
        }

        [data-theme="green"] {
            /* 5. Green Theme (Nuansa Pertumbuhan & Sains) */
            --bg-gradient: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
            --bg-surface: rgba(2, 44, 34, 0.65);
            --bg-surface-el: rgba(6, 78, 59, 0.75);
            --border-color: rgba(110, 231, 183, 0.2);
            --text-main: #ecfdf5;
            --text-muted: #6ee7b7;
            --color-primary: #10b981;
            --color-primary-hover: #34d399;
            --color-ring: rgba(16, 185, 129, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.25);
        }

        /* ================= GENERAL STYLES ================= */
        * { 
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease; 
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            background-size: cover;
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background-color: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-color) 0 8px 32px 0;
        }

        .glass-input {
            background-color: var(--bg-surface-el);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 10px; opacity: 0.8; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-primary-hover); }
        
        /* Card hover effect */
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: var(--shadow-color) 0 12px 40px 0; }
        
        /* Layout fix */
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .sticky-footer { position: sticky; bottom: 0; z-index: 40; }
        
        /* Glowing Theme Buttons */
        .theme-btn.active {
            ring-width: 2px;
            ring-offset-width: 2px;
            ring-offset-color: var(--bg-surface-el);
            transform: scale(1.15);
            box-shadow: 0 0 15px var(--color-ring);
        }
        
        /* Select input wrapper */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            font-size: 0.6rem;
            color: var(--text-muted);
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Table sticky headers & styling */
        .table-container thead th { 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            background-color: var(--bg-surface-el); 
            backdrop-filter: blur(12px);
        }
        tbody tr { border-bottom: 1px solid var(--border-color); }
        tbody tr:last-child { border-bottom: none; }
    </style>
</head>

<body class="text-theme-text min-h-screen flex flex-col">
    
    <!-- ========== STICKY HEADER ========== -->
    <header class="sticky-header glass-panel border-b-0 border-b border-theme-border rounded-b-2xl mx-2 md:mx-4 mt-2">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3.5 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-gradient-to-br from-theme-primary to-theme-primaryHover p-2.5 rounded-2xl shadow-lg shadow-theme-primary/40 text-white shrink-0">
                    <i data-lucide="sparkles" class="w-6 h-6 md:w-7 md:h-7"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-extrabold tracking-tight">Prompt Master <span class="text-theme-primary drop-shadow-md">v20</span></h1>
                    <p class="text-[10px] md:text-xs font-medium text-theme-muted tracking-wide flex items-center gap-1">
                        <i data-lucide="pen-tool" class="w-3 h-3"></i> Mohammad Aienor Rakhman, S.Pd
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end">
                <div class="hidden md:flex items-center gap-2 px-4 py-1.5 glass-input rounded-full">
                    <i data-lucide="cpu" class="w-4 h-4 text-theme-primary"></i>
                    <span class="text-[11px] font-semibold text-theme-text uppercase tracking-wider">AI Mode</span>
                </div>
                
                <!-- Theme Selector (5 Gradient Themes) -->
                <div class="flex items-center gap-2 p-1.5 glass-input rounded-full shadow-inner">
                    <button onclick="setTheme('light')" class="theme-btn w-6 h-6 rounded-full bg-gradient-to-br from-[#e0f2fe] to-[#f1f5f9] border border-slate-300 ring-[#0284c7] transition-all hover:scale-110" title="Terang (Light)"></button>
                    <button onclick="setTheme('dark')" class="theme-btn w-6 h-6 rounded-full bg-gradient-to-br from-[#0f172a] to-[#1e1b4b] border border-slate-600 ring-[#6366f1] transition-all hover:scale-110" title="Gelap (Dark)"></button>
                    <button onclick="setTheme('purple')" class="theme-btn w-6 h-6 rounded-full bg-gradient-to-br from-[#2e1065] to-[#4c1d95] border border-purple-500 ring-[#a855f7] transition-all hover:scale-110" title="Ungu (Purple)"></button>
                    <button onclick="setTheme('orange')" class="theme-btn w-6 h-6 rounded-full bg-gradient-to-br from-[#7c2d12] to-[#9a3412] border border-orange-500 ring-[#f97316] transition-all hover:scale-110" title="Oranye (Orange)"></button>
                    <button onclick="setTheme('green')" class="theme-btn w-6 h-6 rounded-full bg-gradient-to-br from-[#022c22] to-[#064e3b] border border-emerald-500 ring-[#10b981] transition-all hover:scale-110" title="Hijau (Green)"></button>
                </div>
            </div>
        </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 md:px-8 py-6 md:py-8">
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 lg:gap-8">
            
            <!-- LEFT PANEL: Controls + Table -->
            <div class="xl:col-span-8 space-y-6">
                
                <!-- Control Card (Glassmorphism) -->
                <div class="glass-panel rounded-3xl p-5 md:p-6 space-y-6 card-hover">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-theme-muted tracking-wider flex items-center gap-1.5"><i data-lucide="user" class="w-3.5 h-3.5"></i> Penyusun</label>
                            <input type="text" id="author" placeholder="Mohammad Aienor Rakhman, S.Pd" class="w-full p-3 rounded-xl glass-input text-theme-text text-sm focus:ring-2 focus:ring-theme-primary outline-none" oninput="generatePrompt()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-theme-muted tracking-wider flex items-center gap-1.5"><i data-lucide="book" class="w-3.5 h-3.5"></i> Mata Pelajaran</label>
                            <input type="text" id="subject" placeholder="Fisika" class="w-full p-3 rounded-xl glass-input text-theme-text text-sm focus:ring-2 focus:ring-theme-primary outline-none" oninput="generatePrompt()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-theme-muted tracking-wider flex items-center gap-1.5"><i data-lucide="graduation-cap" class="w-3.5 h-3.5"></i> Kelas/Fase</label>
                            <div class="select-wrapper">
                                <select id="grade" class="w-full p-3 rounded-xl glass-input text-theme-text text-sm outline-none cursor-pointer focus:ring-2 focus:ring-theme-primary" onchange="generatePrompt()">
                                    <option value="X (Fase E)">Kelas 10 (Fase E)</option>
                                    <option value="XI (Fase F)">Kelas 11 (Fase F)</option>
                                    <option value="XII (Fase F)">Kelas 12 (Fase F)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-theme-muted tracking-wider flex items-center gap-1.5"><i data-lucide="target" class="w-3.5 h-3.5"></i> Materi Utama</label>
                            <input type="text" id="mainTopic" placeholder="Contoh: Arus Bolak Balik" class="w-full p-3 rounded-xl glass-input text-theme-text text-sm outline-none focus:ring-2 focus:ring-theme-primary" oninput="updateAllTopics()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-theme-muted tracking-wider flex items-center gap-1.5"><i data-lucide="clipboard-list" class="w-3.5 h-3.5"></i> Metode Asesmen & Jumlah</label>
                            <div class="flex gap-3">
                                <div class="select-wrapper flex-1">
                                    <select id="assessmentType" class="w-full p-3 rounded-xl glass-input text-theme-text text-sm outline-none cursor-pointer focus:ring-2 focus:ring-theme-primary" onchange="generatePrompt()">
                                        <option value="Soal Reguler">Reguler</option>
                                        <option value="AKM (Numerasi)">AKM Numerasi</option>
                                        <option value="AKM (Literasi)">AKM Literasi</option>
                                        <option value="AKM (Campuran: Literasi & Numerasi)">AKM Campuran</option>
                                    </select>
                                </div>
                                <div class="relative w-24 shrink-0">
                                    <input type="number" id="totalQuestions" value="5" min="1" max="50" class="w-full p-3 rounded-xl glass-input text-theme-text text-sm text-center font-bold outline-none focus:ring-2 focus:ring-theme-primary" oninput="renderTable()">
                                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                        <i data-lucide="hash" class="w-3.5 h-3.5 text-theme-muted"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bulk Settings & Randomizer -->
                    <div class="p-4 rounded-2xl glass-input flex flex-col md:flex-row gap-4 items-center justify-between shadow-inner border border-theme-border/50">
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="flex items-center gap-2">
                                <i data-lucide="settings-2" class="w-4 h-4 text-theme-primary"></i>
                                <span class="text-[11px] font-black uppercase text-theme-text tracking-wider">Set Seragam:</span>
                            </div>
                            <label class="flex items-center gap-2 cursor-pointer group hover:bg-theme-surfaceEl px-2 py-1 rounded-lg transition-colors">
                                <input type="checkbox" id="syncType" class="w-4 h-4 rounded border-theme-border text-theme-primary focus:ring-theme-primary bg-theme-surface" onchange="syncAllSettings()">
                                <span class="text-xs font-semibold text-theme-muted group-hover:text-theme-text">Jenis Soal</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer group hover:bg-theme-surfaceEl px-2 py-1 rounded-lg transition-colors">
                                <input type="checkbox" id="syncLevel" class="w-4 h-4 rounded border-theme-border text-theme-primary focus:ring-theme-primary bg-theme-surface" onchange="syncAllSettings()">
                                <span class="text-xs font-semibold text-theme-muted group-hover:text-theme-text">Level</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer group hover:bg-theme-surfaceEl px-2 py-1 rounded-lg transition-colors">
                                <input type="checkbox" id="syncStimulus" class="w-4 h-4 rounded border-theme-border text-theme-primary focus:ring-theme-primary bg-theme-surface" onchange="syncAllSettings()">
                                <span class="text-xs font-semibold text-theme-muted group-hover:text-theme-text">Stimulus</span>
                            </label>
                        </div>
                        <div class="w-px h-6 bg-theme-border hidden md:block"></div>
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="flex items-center gap-1.5">
                                <i data-lucide="shuffle" class="w-4 h-4 text-emerald-500"></i>
                                <span class="text-[11px] font-black uppercase text-theme-text tracking-wider">Acak:</span>
                            </div>
                            <button onclick="randomizeType()" class="px-3 py-1.5 text-xs font-bold rounded-xl glass-input text-theme-text hover:border-theme-primary hover:text-theme-primary transition-all shadow-sm">Jenis Soal</button>
                            <button onclick="randomizeLevel()" class="px-3 py-1.5 text-xs font-bold rounded-xl glass-input text-theme-text hover:border-theme-primary hover:text-theme-primary transition-all shadow-sm">Level</button>
                            <button onclick="randomizeStimulus()" class="px-3 py-1.5 text-xs font-bold rounded-xl glass-input text-theme-text hover:border-theme-primary hover:text-theme-primary transition-all shadow-sm">Stimulus</button>
                        </div>
                    </div>
                </div>

                <!-- Input Matrix Table (Glassmorphism) -->
                <div class="glass-panel rounded-3xl overflow-hidden flex flex-col h-[540px]">
                    <div class="glass-input px-5 py-4 border-b border-theme-border flex justify-between items-center bg-opacity-50">
                        <div class="flex items-center gap-2">
                            <i data-lucide="table-2" class="w-4 h-4 text-theme-primary"></i>
                            <span class="text-xs font-bold uppercase tracking-wider text-theme-text">Matrik Spesifikasi Soal</span>
                        </div>
                        <span class="text-[10px] bg-theme-primary/20 text-theme-primary px-3 py-1 rounded-full font-bold uppercase tracking-widest border border-theme-primary/30 shadow-[0_0_10px_var(--color-ring)]">Dinamis</span>
                    </div>
                    <div class="overflow-auto table-container flex-1">
                        <table class="w-full text-left border-collapse min-w-[850px]">
                            <thead>
                                <tr>
                                    <th class="p-4 text-[11px] font-black uppercase text-theme-text/80 w-14 text-center border-b-2 border-theme-border">No</th>
                                    <th class="p-4 text-[11px] font-black uppercase text-theme-text/80 min-w-[190px] border-b-2 border-theme-border">Jenis Soal</th>
                                    <th class="p-4 text-[11px] font-black uppercase text-theme-text/80 w-32 border-b-2 border-theme-border">Level</th>
                                    <th class="p-4 text-[11px] font-black uppercase text-theme-text/80 min-w-[170px] border-b-2 border-theme-border">Jenis Stimulus</th>
                                    <th class="p-4 text-[11px] font-black uppercase text-theme-text/80 min-w-[280px] border-b-2 border-theme-border">Materi Spesifik</th>
                                </tr>

                            <tbody id="questionTableBody"></tbody>

            <!-- RIGHT PANEL: Result & Copy -->
            <div class="xl:col-span-4 space-y-4">
                <div class="sticky top-24">
                    <button onclick="copyToClipboard()" class="w-full py-4 bg-gradient-to-r from-theme-primary to-theme-primaryHover hover:scale-[1.02] text-white rounded-2xl shadow-lg shadow-theme-primary/30 transition-all mb-5 flex items-center justify-center gap-2 font-bold text-sm uppercase tracking-wide border border-white/10">
                        <i data-lucide="copy" class="w-5 h-5"></i> Salin Prompt
                    </button>
                    
                    <div class="relative rounded-3xl overflow-hidden shadow-2xl border border-theme-border glass-panel">
                        <div class="flex items-center gap-2 glass-input px-4 py-3 border-b border-theme-border">
                            <div class="w-3 h-3 rounded-full bg-red-500/90 shadow-[0_0_5px_rgba(239,68,68,0.5)]"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/90 shadow-[0_0_5px_rgba(234,179,8,0.5)]"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/90 shadow-[0_0_5px_rgba(34,197,94,0.5)]"></div>
                            <span class="ml-2 text-[10px] font-mono text-theme-text/70">prompt-output.md</span>
                        </div>
                        <!-- Terminal-like textarea -->
                        <textarea id="finalPrompt" readonly class="w-full h-[578px] p-5 text-[12px] md:text-[13px] font-mono leading-relaxed bg-[#0d1117]/90 text-[#e6edf3] focus:outline-none resize-none backdrop-blur-md" placeholder="Prompt akan digenerate otomatis..."></textarea>

    <!-- ========== STICKY FOOTER ========== -->
    <footer class="sticky-footer glass-panel border-t border-theme-border py-4 mt-auto rounded-t-2xl mx-2 md:mx-4 mb-2">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center text-[11px] text-theme-text/80 font-medium gap-2">
            <div class="flex items-center gap-2">
                <i data-lucide="copyright" class="w-3.5 h-3.5"></i>
                <span>2025 Prompt Master v20 | Mohammad Aienor Rakhman, S.Pd</span>
            </div>
            <div class="flex items-center gap-3">
                <i data-lucide="layout-dashboard" class="w-3.5 h-3.5 text-theme-primary"></i>
                <span>Glassmorphism UI • 5 Educational Gradients</span>
            </div>

    </footer>

    <script>
        // ==================== THEME MANAGEMENT ====================
        const themes = ['light', 'dark', 'purple', 'orange', 'green'];
        
        function initTheme() {
            let savedTheme = localStorage.getItem('pm_theme');
            if (!themes.includes(savedTheme)) {
                savedTheme = 'dark'; // Default theme
            }
            setTheme(savedTheme);
        }
        
        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('pm_theme', themeName);
            
            // Update active state on buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeBtn = document.querySelector(`.theme-btn[onclick="setTheme('${themeName}')"]`);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }
        
        // ==================== CORE FUNCTIONS ====================
        // Semua logika dibiarkan persis sama sesuai permintaan.
        
        const tableBody = document.getElementById('questionTableBody');
        const totalInput = document.getElementById('totalQuestions');
        const mainTopicInput = document.getElementById('mainTopic');
        const syncTypeCb = document.getElementById('syncType');
        const syncLevelCb = document.getElementById('syncLevel');
        const syncStimulusCb = document.getElementById('syncStimulus');
        
        function refreshIcons() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }
        
        function renderTable() {
            let count = parseInt(totalInput.value) || 0;
            count = Math.min(Math.max(count, 1), 50);
            totalInput.value = count;
            const currentRows = tableBody.children.length;
            const defTopicPlaceholder = mainTopicInput.value || "Materi Spesifik";
            
            if (count > currentRows) {
                for (let i = currentRows + 1; i <= count; i++) {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-theme-surfaceEl/50 transition-colors duration-150 group";
                    
                    tr.innerHTML = `
                        <td class="p-3 text-center font-mono font-bold text-theme-primary text-sm">${i}</td>
                        <td class="p-2">
                            <div class="select-wrapper">
                                <select class="q-type w-full p-2.5 rounded-xl glass-input text-theme-text text-[11px] outline-none focus:ring-2 focus:ring-theme-primary transition-all" onchange="syncAllSettings()">
                                    <option>Pilihan Ganda (PG)</option>
                                    <option>PG Kompleks</option>
                                    <option>Menjodohkan</option>
                                    <option>Isian Singkat</option>
                                    <option>Uraian</option>
                                    <option>Benar Salah</option>
                                </select>
                            </div>
                        </td>
                        <td class="p-2">
                            <div class="select-wrapper">
                                <select class="q-level w-full p-2.5 rounded-xl glass-input text-theme-text text-[11px] outline-none focus:ring-2 focus:ring-theme-primary transition-all">
                                    <option value="L1">L1 (Pengetahuan)</option>
                                    <option value="L2">L2 (Aplikasi)</option>
                                    <option value="L3" selected>L3 (Analisis/HOTS)</option>
                                </select>
                            </div>
                        </td>
                        <td class="p-2">
                            <div class="select-wrapper">
                                <select class="q-stimulus w-full p-2.5 rounded-xl glass-input text-theme-text text-[11px] outline-none focus:ring-2 focus:ring-theme-primary transition-all">
                                    <option value="Teks Kontekstual">Teks Kontekstual</option>
                                    <option value="Grafik">Grafik</option>
                                    <option value="Tabel Data">Tabel Data</option>
                                    <option value="Ilustrasi">Ilustrasi</option>
                                    <option value="Infografis">Infografis</option>
                                </select>
                            </div>
                        </td>
                        <td class="p-2">
                            <textarea class="q-topic w-full p-2.5 rounded-xl glass-input text-theme-text text-[11px] outline-none resize-y focus:ring-2 focus:ring-theme-primary transition-all" rows="1" placeholder="${defTopicPlaceholder}" oninput="generatePrompt()"></textarea>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                }
            } else if (count < currentRows) {
                while (tableBody.children.length > count) tableBody.removeChild(tableBody.lastChild);
            }
            
            const allTopics = document.querySelectorAll('.q-topic');
            allTopics.forEach(t => { if (!t.value) t.placeholder = defTopicPlaceholder; });
            syncAllSettings();
            refreshIcons();
        }
        
        function syncAllSettings() {
            const rows = tableBody.querySelectorAll('tr');
            if (rows.length === 0) return;
            const firstType = rows[0]?.querySelector('.q-type')?.value;
            const firstLevel = rows[0]?.querySelector('.q-level')?.value;
            const firstStimulus = rows[0]?.querySelector('.q-stimulus')?.value;
            
            rows.forEach((row, idx) => {
                const typeEl = row.querySelector('.q-type');
                const levelEl = row.querySelector('.q-level');
                const stimulusEl = row.querySelector('.q-stimulus');
                
                if (syncTypeCb.checked) {
                    if (idx > 0 && firstType) typeEl.value = firstType;
                    typeEl.disabled = (idx > 0);
                    typeEl.classList.toggle('opacity-50', idx > 0);
                    typeEl.classList.toggle('cursor-not-allowed', idx > 0);
                } else {
                    typeEl.disabled = false;
                    typeEl.classList.remove('opacity-50', 'cursor-not-allowed');
                }
                if (syncLevelCb.checked) {
                    if (idx > 0 && firstLevel) levelEl.value = firstLevel;
                    levelEl.disabled = (idx > 0);
                    levelEl.classList.toggle('opacity-50', idx > 0);
                    levelEl.classList.toggle('cursor-not-allowed', idx > 0);
                } else {
                    levelEl.disabled = false;
                    levelEl.classList.remove('opacity-50', 'cursor-not-allowed');
                }
                if (syncStimulusCb.checked) {
                    if (idx > 0 && firstStimulus) stimulusEl.value = firstStimulus;
                    stimulusEl.disabled = (idx > 0);
                    stimulusEl.classList.toggle('opacity-50', idx > 0);
                    stimulusEl.classList.toggle('cursor-not-allowed', idx > 0);
                } else {
                    stimulusEl.disabled = false;
                    stimulusEl.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
            generatePrompt();
        }
        
        function randomizeType() {
            if (syncTypeCb.checked) { syncTypeCb.checked = false; syncAllSettings(); }
            const types = ["Pilihan Ganda (PG)", "PG Kompleks", "Menjodohkan", "Isian Singkat", "Uraian", "Benar Salah"];
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const typeEl = row.querySelector('.q-type');
                if (typeEl) typeEl.value = types[Math.floor(Math.random() * types.length)];
            });
            generatePrompt();
        }
        
        function randomizeLevel() {
            if (syncLevelCb.checked) { syncLevelCb.checked = false; syncAllSettings(); }
            const levels = ["L1", "L2", "L3"];
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const levelEl = row.querySelector('.q-level');
                if (levelEl) levelEl.value = levels[Math.floor(Math.random() * levels.length)];
            });
            generatePrompt();
        }
        
        function randomizeStimulus() {
            if (syncStimulusCb.checked) { syncStimulusCb.checked = false; syncAllSettings(); }
            const stimuli = ["Grafik", "Tabel Data", "Ilustrasi", "Teks Kontekstual", "Infografis"];
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(row => {
                const stimulusEl = row.querySelector('.q-stimulus');
                if (stimulusEl) stimulusEl.value = stimuli[Math.floor(Math.random() * stimuli.length)];
            });
            generatePrompt();
        }
        
        function updateAllTopics() {
            const inputs = document.querySelectorAll('.q-topic');
            inputs.forEach(input => input.placeholder = mainTopicInput.value || "Materi Spesifik");
            generatePrompt();
        }
        
        function generatePrompt() {
            const author = document.getElementById('author').value || "Mohammad Aienor Rakhman, S.Pd";
            const subject = document.getElementById('subject').value || "Fisika";
            const grade = document.getElementById('grade').value;
            const assess = document.getElementById('assessmentType').value;
            const rows = tableBody.querySelectorAll('tr');
            let qList = "";
            rows.forEach((row, i) => {
                const type = row.querySelector('.q-type')?.value || "Pilihan Ganda (PG)";
                const level = row.querySelector('.q-level')?.value || "L3";
                const stimulus = row.querySelector('.q-stimulus')?.value || "Teks Kontekstual";
                let topic = row.querySelector('.q-topic')?.value || "";
                if (!topic.trim()) topic = mainTopicInput.value || "Materi Relevan";
                qList += `${i+1}. Jenis: ${type} | Level: ${level} | Stimulus: ${stimulus} | Materi: ${topic}\n`;
            });
            
            const prompt = `Bertindaklah sebagai Ahli Kurikulum dan Guru Fisika Senior.

DATA ADMINISTRASI:
- Nama Penyusun: ${author}
- Mata Pelajaran: ${subject}
- Tingkat/Fase: ${grade}
- Mode Asesmen: ${assess}

TUGAS UTAMA:

1. KISI-KISI SOAL (FORMAT TABEL):
Buat tabel kisi-kisi untuk ${rows.length} butir soal dengan kolom sebagai berikut:
| No | CP (Capaian Pembelajaran) | Materi | Indikator Soal | Level | Taksonomi Bloom (C1-C6) | Jenis Soal |

2. NASKAH SOAL:
Buatlah naskah soal lengkap (No 1 s.d ${rows.length}) sesuai rincian berikut:
${qList}
   *Ketentuan: 
   - WAJIB gunakan jenis stimulus yang telah ditetapkan pada rincian di atas untuk masing-masing soal.
   - Jika L3, soal harus bersifat analitis/kontekstual/HOTS.
   - Jika soal menggunakan stimulus GRAFIK, WAJIB sertakan tabel data angkanya yang bisa disalin ke Excel untuk digambar ulang, selain mendeskripsikan visual grafiknya dengan teks.*

3. KARTU SOAL (FORMAT LANDSCAPE/HORIZONTAL):
Sajikan data kartu soal untuk SELURUH nomor (1 s.d ${rows.length}). DILARANG KERAS melakukan sampling (menampilkan sebagian saja).
Setiap nomor wajib dituliskan secara mandiri dalam baris tabel dengan kolom:
| No | CP | ATP | Indikator Soal | Elemen | Level | Taksonomi Bloom | No Soal | Naskah Soal (Tulis Ulang) | Kunci (Hasil Akhir Saja) |

4. PEMBAHASAN:
Berikan langkah-langkah penyelesaian singkat untuk setiap nomor (1 s.d ${rows.length}) di bagian akhir naskah.

Pastikan akurasi konsep fisika, penggunaan satuan internasional, dan kualitas bahasa Indonesia yang baku.`;

            const finalArea = document.getElementById('finalPrompt');
            if (finalArea) finalArea.value = prompt;
        }
        
        function copyToClipboard() {
            const el = document.getElementById('finalPrompt');
            if (!el) return;
            el.select();
            document.execCommand('copy');
            const btn = document.querySelector('button[onclick="copyToClipboard()"]');
            if (btn) {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> BERHASIL DISALIN!`;
                btn.classList.add('bg-emerald-500', 'border-emerald-400');
                if (typeof lucide !== 'undefined') lucide.createIcons();
                setTimeout(() => { 
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('bg-emerald-500', 'border-emerald-400');
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }, 2000);
            }
        }
        
        // Initializer
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderTable();
            generatePrompt();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
        
        // Expose functions to window
        window.renderTable = renderTable;
        window.syncAllSettings = syncAllSettings;
        window.randomizeType = randomizeType;
        window.randomizeLevel = randomizeLevel;
        window.randomizeStimulus = randomizeStimulus;
        window.updateAllTopics = updateAllTopics;
        window.generatePrompt = generatePrompt;
        window.copyToClipboard = copyToClipboard;
        window.setTheme = setTheme;
    </script>
</body>
</html>
