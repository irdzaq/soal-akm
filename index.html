<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Master v19 + Gemini Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        /* --- Light Mode Styles --- */
        input, select, textarea {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }

        /* --- Full Dark Mode Overrides --- */
        .dark { background-color: #020617; color: #f1f5f9; } 
        .dark .card { background-color: #0f172a; border-color: #1e293b; }
        
        .dark input, .dark select, .dark textarea { 
            background-color: #1e293b; 
            border-color: #334155; 
            color: #f8fafc; 
        }
        
        .dark input:focus, .dark select:focus, .dark textarea:focus {
            border-color: #6366f1;
            background-color: #0f172a;
        }

        /* --- Specific Component Styling --- */
        #finalPrompt, #aiResultContainer {
            background-color: #f8fafc;
            color: #1e293b;
            border-color: #cbd5e1;
        }
        .dark #finalPrompt, .dark #aiResultContainer {
            background-color: #020617;
            color: #818cf8;
            border-color: #1e293b;
        }
        
        .gradient-primary { background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); }
        .gradient-gemini { background: linear-gradient(135deg, #2563eb 0%, #9333ea 100%); }
        
        .floating-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .floating-btn:hover { transform: scale(1.05); }
        .floating-btn:active { transform: scale(0.95); }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Locked State */
        select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background-color: #f1f5f9;
            color: #94a3b8;
        }
        .dark select:disabled { 
            background-color: #020617;
            color: #475569;
        }

        /* Scrollbar Full Dark */
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark .table-container::-webkit-scrollbar-thumb { background-color: #334155; }

        /* Markdown Styles for AI Result */
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.9rem; page-break-inside: avoid; }
        .markdown-body th, .markdown-body td { border: 1px solid #475569; padding: 10px; }
        .markdown-body th { background-color: #f1f5f9; font-weight: bold; color: #000; }
        .dark .markdown-body th { background-color: #1e293b; color: #fff; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1.5em; margin-bottom: 0.8em; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        
        /* Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Dropdown Animation */
        .dropdown-enter {
            animation: dropdownSlideIn 0.2s ease-out forwards;
        }
        @keyframes dropdownSlideIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- PRINT ENGINE OPTIMIZATION --- */
        @media print {
            body * { visibility: hidden; }
            #outputPanel, #outputPanel *, #aiResultContainer, #aiResultContainer * { visibility: visible; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            #outputPanel {
                position: absolute; left: 0; top: 0; width: 100% !important; margin: 0 !important; padding: 0 !important; visibility: visible; display: block !important;
            }
            .card { border: none !important; box-shadow: none !important; background: transparent !important; height: auto !important; padding: 0 !important; margin: 0 !important; }
            #aiResultContainer { height: auto !important; min-height: 100% !important; overflow: visible !important; border: none !important; padding: 0 !important; margin: 0 !important; display: block !important; }
            .markdown-body { color: black !important; font-size: 11pt !important; }
            .markdown-body table { border: 1px solid black !important; page-break-inside: auto; }
            .markdown-body tr { page-break-inside: avoid; page-break-after: auto; }
            .markdown-body th, .markdown-body td { border: 1px solid black !important; color: black !important; }
            .no-print, #toggleViewBtn, #printBtn, #outputTitle, i, .flex-shrink-0, .floating-btn, .dropdown-menu { display: none !important; visibility: hidden !important; }
            @page { margin: 2cm; size: auto; }
        }
    </style>
</head>

    <script>
        // API KEY MANAGEMENT
        const DEFAULT_API_KEY = "AIzaSyAev3FgrRmtx5RqDb0bzE_VWUTduqqn3MQ"; // Public Default
        const modelId = "gemini-2.5-flash-preview-09-2025";
        
        // Load Saved API Key
        function getEffectiveApiKey() {
            const savedKey = localStorage.getItem('userGeminiApiKey');
            return savedKey && savedKey.trim() !== "" ? savedKey : DEFAULT_API_KEY;
        }

        function toggleApiDropdown() {
            const dropdown = document.getElementById('apiKeyDropdown');
            const input = document.getElementById('customApiKeyInput');
            
            if (dropdown.classList.contains('hidden')) {
                // Show dropdown
                dropdown.classList.remove('hidden');
                dropdown.classList.add('dropdown-enter');
                input.value = localStorage.getItem('userGeminiApiKey') || "";
                input.focus();
                
                // Close when clicking outside
                document.addEventListener('click', closeDropdownOnClickOutside);
            } else {
                closeApiDropdown();
            }
        }

        function closeApiDropdown() {
            const dropdown = document.getElementById('apiKeyDropdown');
            dropdown.classList.add('hidden');
            dropdown.classList.remove('dropdown-enter');
            document.removeEventListener('click', closeDropdownOnClickOutside);
        }

        function closeDropdownOnClickOutside(event) {
            const dropdown = document.getElementById('apiKeyDropdown');
            const toggleBtn = dropdown.previousElementSibling; // The button
            if (!dropdown.contains(event.target) && !toggleBtn.contains(event.target)) {
                closeApiDropdown();
            }
        }

        function saveApiKey() {
            const input = document.getElementById('customApiKeyInput');
            const newValue = input.value.trim();
            
            if (newValue) {
                localStorage.setItem('userGeminiApiKey', newValue);
                // Visual feedback inside dropdown
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> Tersimpan!`;
                btn.classList.add('bg-green-600', 'hover:bg-green-500');
                btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-500');
                
                setTimeout(() => {
                    closeApiDropdown();
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-green-600', 'hover:bg-green-500');
                    btn.classList.add('bg-indigo-600', 'hover:bg-indigo-500');
                    lucide.createIcons();
                }, 1000);
            } else {
               clearApiKey();
            }
        }

        function clearApiKey() {
            localStorage.removeItem('userGeminiApiKey');
            document.getElementById('customApiKeyInput').value = "";
            alert("API Key dihapus. Menggunakan default key.");
            closeApiDropdown();
        }

        lucide.createIcons();
        marked.setOptions({ breaks: true, gfm: true });

        const tableBody = document.getElementById('questionTableBody');
        const totalInput = document.getElementById('totalQuestions');
        const mainTopicInput = document.getElementById('mainTopic');
        const assessmentTypeSelect = document.getElementById('assessmentType');
        const outputPanel = document.getElementById('outputPanel');
        const finalPromptArea = document.getElementById('finalPrompt');
        const aiResultDiv = document.getElementById('aiResultContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const runBtn = document.getElementById('runGeminiBtn');

        const questionTypes = ["Pilihan Ganda (PG)", "Pilihan Ganda Kompleks (PGK)", "Menjodohkan", "Isian Singkat", "Uraian / Esai", "Benar - Salah"];
        const levels = [{val: "L1", label: "L1 (Mengingat)"}, {val: "L2", label: "L2 (Aplikasi)"}, {val: "L3", label: "L3 (HOTS)"}];

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            setTimeout(() => lucide.createIcons(), 50);
        }

        function syncQuestionTypes() {
            const isReguler = assessmentTypeSelect.value.includes("Reguler");
            document.querySelectorAll('.q-type').forEach(select => {
                if (isReguler) { select.value = "Pilihan Ganda (PG)"; select.disabled = true; } 
                else { select.disabled = false; }
            });
        }

        function renderTable() {
            const count = Math.max(parseInt(totalInput.value) || 0, 0);
            const currentRows = tableBody.children.length;
            const topicDefault = mainTopicInput.value || "";
            const isReguler = assessmentTypeSelect.value.includes("Reguler");

            if (count > currentRows) {
                for (let i = currentRows + 1; i <= count; i++) {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-slate-50 dark:border-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800/50";
                    tr.innerHTML = `
                        <td class="p-3 text-center font-bold text-slate-400">${i}</td>
                        <td class="p-2"><select class="q-type w-full p-2 rounded-lg text-xs outline-none ${isReguler ? 'opacity-50' : ''}" ${isReguler ? 'disabled' : ''}>${questionTypes.map(t => `<option value="${t}" ${isReguler && t.includes("PG") ? 'selected' : ''}>${t}</option>`).join('')}</select></td>
                        <td class="p-2"><select class="q-level w-full p-2 rounded-lg text-xs outline-none">${levels.map(l => `<option value="${l.val}">${l.label}</option>`).join('')}</select></td>
                        <td class="p-2"><input type="text" class="q-topic w-full p-2 rounded-lg text-xs outline-none placeholder-slate-300" placeholder="${topicDefault ? '(' + topicDefault + ')' : 'Materi...'}"></td>
                    `;
                    tableBody.appendChild(tr);
                }
            } else {
                while (tableBody.children.length > count) tableBody.removeChild(tableBody.lastChild);
            }
        }

        function updateAllTopics() {
            const val = mainTopicInput.value;
            document.querySelectorAll('.q-topic').forEach(inp => inp.placeholder = val ? `(${val})` : "Materi...");
        }

        function buildPrompt() {
            const subject = document.getElementById('subject').value || "[Mapel]";
            const grade = document.getElementById('grade').value;
            const mainTopic = mainTopicInput.value || "Materi Umum";
            const assessType = assessmentTypeSelect.value;
            const domain = document.getElementById('competencyDomain').value;
            const rows = tableBody.querySelectorAll('tr');
            if (rows.length === 0) return null;

            let questionsList = "";
            rows.forEach((row, index) => {
                const type = row.querySelector('.q-type').value;
                const level = row.querySelector('.q-level').value;
                let specificTopic = row.querySelector('.q-topic').value;
                if (!specificTopic || specificTopic.trim() === "") specificTopic = mainTopic;
                questionsList += `   No.${index + 1} -> Jenis: ${type} | Level: ${level} | Materi: ${specificTopic}\n`;
            });
            const kartuSoalFormat = `
FORMAT KARTU SOAL (WAJIB IKUTI TABEL INI UNTUK SETIAP NOMOR):
----------------------------------------------------------------------
KARTU SOAL NOMOR [No. Urut]
(Pilihan Ganda / Uraian)

Mata Pelajaran: ${subject}       Kelas/Fase: ${grade}
Kurikulum: Kurikulum Merdeka
----------------------------------------------------------------------
| Capaian Pembelajaran (CP) / TP | Buku Sumber: [Sebutkan Buku Ref]   |
|--------------------------------|------------------------------------|
| [Tuliskan CP/TP di sini...]    | SOAL:                              |
|                                | [Tuliskan Naskah Soal Lengkap]     |
|                                | (Jika ada gambar, tulis [Gambar])  |
|--------------------------------|                                    |
| Materi                         | (Tuliskan Opsi A-E jika PG)        |
|--------------------------------|                                    |
| [Tuliskan Materi di sini...]   |                                    |
|--------------------------------|                                    |
| Indikator Soal                 | KUNCI JAWABAN: [Kunci]             |
|--------------------------------|------------------------------------|
| [Siswa mampu...]               | Level Kognitif: [L1/L2/L3]         |
----------------------------------------------------------------------`;

            return `Bertindaklah sebagai Penyusun Soal Profesional (Assessment Expert).

DATA:
- Mapel: ${subject}
- Kelas: ${grade}
- Materi Utama: ${mainTopic}
- Format: ${assessType}
- Domain: ${domain}

TUGAS ANDA ADALAH MEMBUAT PERANGKAT SOAL LENGKAP DENGAN URUTAN:

1. KARTU SOAL (FORMAT STANDAR)
   Buatkan Kartu Soal untuk SETIAP BUTIR dari No 1 s.d ${rows.length}.
   Gunakan format tabel kotak berikut:
${kartuSoalFormat}

2. KISI-KISI SOAL (TABEL)
   Kolom: No | Materi | Tujuan Pembelajaran (TP) | Indikator Soal | Level | Bentuk Soal | No. Soal

3. NASKAH SOAL (${rows.length} Butir)
   Ikuti spesifikasi ini:
${questionsList}

4. PEMBAHASAN DETAIL
   Format: No | Kunci | Pembahasan Rinci.

Pastikan bahasa baku, jelas, dan sesuai kaidah kurikulum terbaru (menggunakan istilah Capaian Pembelajaran/TP).`;
        }

        async function runGemini() {
            const prompt = buildPrompt();
            if (!prompt) return;
            
            const currentKey = getEffectiveApiKey(); // Get Dynamic Key
            
            showOutputPanel();
            setViewMode('preview');
            loadingOverlay.classList.remove('hidden');
            runBtn.disabled = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${currentKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error?.message || "Gagal menghubungi Gemini AI.");
                }

                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                finalPromptArea.value = text;
                aiResultDiv.innerHTML = marked.parse(text);
            } catch (e) {
                aiResultDiv.innerHTML = `<div class="text-red-500 font-bold p-4 text-center">Error: ${e.message}<br><br><small class="text-slate-500 font-normal">Jika error berlanjut, coba gunakan API Key pribadi di menu kunci (pojok kanan atas).</small></div>`;
            } finally {
                loadingOverlay.classList.add('hidden');
                runBtn.disabled = false;
            }
        }

        function showOutputPanel() {
            outputPanel.classList.remove('hidden');
            setTimeout(() => outputPanel.scrollIntoView({ behavior: 'smooth' }), 100);
        }

        function setViewMode(mode) {
            const isText = mode === 'text';
            finalPromptArea.classList.toggle('hidden', !isText);
            aiResultDiv.classList.toggle('hidden', isText);
            document.getElementById('toggleViewBtn').innerHTML = isText ? `<i data-lucide="eye" class="w-3 h-3"></i> <span>Preview</span>` : `<i data-lucide="code" class="w-3 h-3"></i> <span>Source</span>`;
            lucide.createIcons();
        }

        function toggleViewMode() {
            setViewMode(finalPromptArea.classList.contains('hidden') ? 'text' : 'preview');
        }

        function generatePromptOnly() {
            const prompt = buildPrompt();
            if (!prompt) return;
            showOutputPanel();
            setViewMode('text');
            finalPromptArea.value = prompt;
        }

        // --- IMPROVED PRINT FUNCTION ---
        function printResult() {
            // Pastikan mode preview aktif agar markdown ter-render
            setViewMode('preview');
            // Berikan sedikit jeda agar CSS print diaplikasikan dengan benar
            setTimeout(() => {
                window.print();
            }, 300);
        }

        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        renderTable();
        syncQuestionTypes();
    </script>
</body>
</html>
